name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
            node-version: 16

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Run QA Automation (Postman)
        run: npm run qa

      - name: Build Docker Image
        if: success()  # only if previous steps passed
        run: |
          docker build -t devops-pipelines:latest .
          docker images
